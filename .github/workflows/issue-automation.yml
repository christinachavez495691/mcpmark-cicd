name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write
  contents: read

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Triage issue and manage labels
        uses: actions/github-script@v7
        with:
          script: |
            const { issue } = context.payload;
            const github = context.github;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = issue.number;

            // Define required labels (name, description, color)
            const requiredLabels = [
              // Category Labels
              { name: "bug", description: "Something isn't working", color: "d73a4a" },
              { name: "enhancement", description: "New feature or request", color: "a2eeef" },
              { name: "epic", description: "Large feature requiring multiple sub-tasks", color: "006b75" },
              { name: "maintenance", description: "Maintenance and housekeeping tasks", color: "f9d0c4" },
              // Priority Labels
              { name: "priority-critical", description: "Critical priority issue", color: "b60205" },
              { name: "priority-high", description: "High priority issue", color: "d93f0b" },
              { name: "priority-medium", description: "Medium priority issue", color: "e66a00" },
              { name: "priority-low", description: "Low priority issue", color: "0e8a16" },
              // Status Labels
              { name: "needs-triage", description: "Needs to be reviewed by maintainers", color: "fbca04" },
              { name: "needs-review", description: "Awaiting review from maintainers", color: "1d76db" },
              { name: "first-time-contributor", description: "Issue created by first-time contributor", color: "0052cc" }
            ];

            // Create missing labels
            for (const label of requiredLabels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
              } catch (err) {
                if (err.status === 404) {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name: label.name,
                    description: label.description,
                    color: label.color
                  });
                }
              }
            }

            // Add initial needs-triage label
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: ["needs-triage"]
            });

            // Apply category labels from title
            const titleLower = issue.title.toLowerCase();
            const categoryLabels = [];
            if (titleLower.includes("bug")) categoryLabels.push("bug");
            if (titleLower.includes("epic")) categoryLabels.push("epic");
            if (titleLower.includes("maintenance")) categoryLabels.push("maintenance");

            if (categoryLabels.length > 0) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: categoryLabels
              });
            }

            // Apply priority label (highest priority first)
            const contentLower = `${issue.title.toLowerCase()} ${issue.body?.toLowerCase() || ""}`;
            let priorityLabel = "priority-medium"; // Default

            const priorityRules = [
              { keywords: ["critical", "urgent", "production", "outage"], label: "priority-critical" },
              { keywords: ["important", "high", "blocking"], label: "priority-high" },
              { keywords: ["low", "nice-to-have", "minor"], label: "priority-low" }
            ];

            for (const rule of priorityRules) {
              if (rule.keywords.some(k => contentLower.includes(k))) {
                priorityLabel = rule.label;
                break;
              }
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: [priorityLabel]
            });

  task-breakdown:
    runs-on: ubuntu-latest
    needs: [issue-triage]
    if: contains(github.event.issue.labels.*.name, 'epic')
    steps:
      - name: Create epic subtasks
        uses: actions/github-script@v7
        with:
          script: |
            const { issue } = context.payload;
            const github = context.github;
            const owner = context.repo.owner;
            const repo = context.repo;
            const parentNumber = issue.number;
            const parentTitle = issue.title;

            // Define subtasks
            const subtasks = [
              "Requirements Analysis",
              "Design and Architecture",
              "Implementation",
              "Testing and Documentation"
            ];

            const subtaskNumbers = [];

            // Create each subtask
            for (let i = 0; i < subtasks.length; i++) {
              const taskIndex = i + 1;
              const taskName = subtasks[i];
              const subtaskTitle = `[SUBTASK] ${parentTitle} - Task ${taskIndex}: ${taskName}`;
              const subtaskBody = `Related to #${parentNumber}`;

              // Create subtask issue
              const createdSubtask = await github.rest.issues.create({
                owner,
                repo,
                title: subtaskTitle,
                body: subtaskBody,
                labels: ["enhancement", "needs-review"]
              });

              subtaskNumbers.push(createdSubtask.data.number);
            }

            // Update parent issue with epic tasks checklist
            const checklistItems = subtaskNumbers.map(num => `- [ ] #${num}`).join("\n");
            const updatedBody = `${issue.body || ""}\n\n## Epic Tasks\n${checklistItems}`;

            await github.rest.issues.update({
              owner,
              repo,
              issue_number: parentNumber,
              body: updatedBody
            });

  auto-response:
    runs-on: ubuntu-latest
    needs: [issue-triage, task-breakdown]
    if: always() # Run even if task-breakdown is skipped (non-epic issues)
    steps:
      - name: Auto-response and final updates
        uses: actions/github-script@v7
        with:
          script: |
            const { issue } = context.payload;
            const github = context.github;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = issue.number;
            const author = issue.user.login;

            // Check if this is the author's first issue in the repo
            const authorIssues = await github.rest.issues.listForRepo({
              owner,
              repo,
              creator: author,
              state: "all"
            });
            const isFirstIssue = authorIssues.data.length === 1; // Current issue is the only one

            // Add first-time-contributor label if applicable
            if (isFirstIssue) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: ["first-time-contributor"]
              });
            }

            // Generate response based on issue type
            const issueLabels = issue.labels.map(l => l.name.toLowerCase());
            let responseContent = "";

            if (issueLabels.includes("bug")) {
              responseContent = "### Bug Report Guidelines\nPlease ensure you've provided:\n- Clear steps to reproduce the bug\n- Expected vs actual behavior\n- Environment details (OS, browser, version)\n\nWe'll review this bug report shortly!";
            } else if (issueLabels.includes("epic")) {
              responseContent = "### Feature Request Process\nThank you for submitting this epic! We've created 4 subtasks to break down this feature work. Please review the subtasks and provide additional details as needed.";
            } else if (issueLabels.includes("maintenance")) {
              responseContent = "### Maintenance Guidelines\nPlease confirm:\n- The scope of the maintenance task\n- Expected outcomes/improvements\n- Any dependencies or risks\n\nWe'll review this maintenance request soon!";
            }

            // Add welcome message for first-time contributors
            if (isFirstIssue) {
              responseContent = `👋 Welcome to the repository, @${author}! This is your first issue here—thank you for contributing!\n\n${responseContent}`;
            }

            // Post response comment if content exists
            if (responseContent) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: responseContent
              });
            }

            // Set milestone for high/critical priority issues
            const hasHighPriority = issueLabels.includes("priority-high") || issueLabels.includes("priority-critical");
            if (hasHighPriority) {
              // Check if v1.0.0 milestone exists
              let milestone;
              try {
                const milestones = await github.rest.issues.listMilestones({
                  owner,
                  repo,
                  state: "all"
                });
                milestone = milestones.data.find(m => m.title === "v1.0.0");

                // Create milestone if missing
                if (!milestone) {
                  milestone = await github.rest.issues.createMilestone({
                    owner,
                    repo,
                    title: "v1.0.0",
                    description: "Milestone for version 1.0.0 features and fixes"
                  });
                }

                // Assign milestone to issue
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  milestone: milestone.data.number
                });
              } catch (err) {
                console.error("Error managing milestone:", err);
              }
            }

            // Update status: remove needs-triage, add needs-review
            await github.rest.issues.removeLabel({
              owner,
              repo,
              issue_number: issueNumber,
              name: "needs-triage"
            });

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: ["needs-review"]
            });